<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Architecture des processus — MISU</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F5F0;
  --surface: #FFFFFF;
  --border: #E2DDD6;
  --text: #1A1916;
  --text-muted: #6B6860;
  --text-hint: #A09D97;
  --radius: 10px;
  --shadow-lg: 0 8px 40px rgba(0,0,0,.12);
  --panel-w: 380px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:12px}
.logo-mark{width:32px;height:32px;background:var(--text);border-radius:6px;display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:18px;height:18px;fill:white}
.logo-text{font-size:15px;font-weight:500;color:var(--text)}
.header-meta{font-size:12px;color:var(--text-hint)}

/* LAYOUT */
.app{display:flex;min-height:calc(100vh - 64px)}
.diagram-pane{flex:1;padding:32px 40px;overflow-y:auto;transition:padding-right .3s}
.app.panel-open .diagram-pane{padding-right:calc(var(--panel-w) + 48px)}

/* INTRO */
.diagram-intro{margin-bottom:24px}
.diagram-intro h1{font-family:'DM Serif Display',serif;font-size:26px;font-weight:400;color:var(--text);margin-bottom:6px}
.diagram-intro p{font-size:13px;color:var(--text-muted);line-height:1.6;max-width:600px}

/* SEARCH */
.search-bar{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 14px;margin-bottom:24px;max-width:400px}
.search-bar input{border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;width:100%}
.search-bar input::placeholder{color:var(--text-hint)}
.search-icon{color:var(--text-hint)}

/* DIAGRAM */
.diagram-wrap{display:flex;flex-direction:column;gap:16px}

/* DOMAIN */
.domain-band{border-radius:12px;overflow:hidden}
.domain-header{padding:10px 18px}
.domain-label{font-size:13px;font-weight:600;letter-spacing:.3px}
.domain-body{padding:14px 14px 16px;display:flex;flex-direction:column;gap:10px}

/* PROCESS ROW */
.process-row{display:flex;flex-direction:row;gap:10px;align-items:stretch}

/* PROCESS CARD */
.process-card{flex:1;min-width:0;background:var(--surface);border-radius:10px;border:1px solid var(--border);overflow:hidden}
.process-header{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border)}
.process-header:hover{background:#f5f3ef}
.process-code-badge{font-size:10px;font-weight:600;letter-spacing:.5px;padding:3px 8px;border-radius:20px;white-space:nowrap}
.process-name{font-size:13px;font-weight:500;color:var(--text);flex:1}

/* SUB-PROCESS CHIPS */
.subproc-wrap{padding:8px 10px 10px;display:flex;flex-direction:row;gap:6px}
.subproc-chip{display:flex;flex-direction:column;align-items:flex-start;justify-content:center;gap:2px;padding:8px 10px;border-radius:7px;font-size:12px;cursor:pointer;border:1px solid transparent;transition:all .15s;flex:1;min-width:0}
.subproc-chip:hover{filter:brightness(.95);transform:translateY(-1px)}
.subproc-chip.active{box-shadow:0 0 0 2px var(--chip-accent)}
.subproc-chip .chip-code{font-weight:600;opacity:.75;font-size:10px;white-space:nowrap}
.subproc-chip .chip-name{font-weight:500;line-height:1.3;word-break:break-word}
.subproc-chip .chip-tasks{font-size:10px;opacity:.55;white-space:nowrap}

/* PANEL */
.panel{position:fixed;top:64px;right:0;width:var(--panel-w);height:calc(100vh - 64px);background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);z-index:90;box-shadow:var(--shadow-lg)}
.panel.open{transform:translateX(0)}
.panel-header{padding:20px 20px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500;margin-bottom:10px}
.panel-title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.panel-code{font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:2px}
.panel-name{font-size:18px;font-weight:500;color:var(--text);line-height:1.3}
.panel-close{width:28px;height:28px;background:var(--bg);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:var(--text-muted);font-size:16px;margin-top:2px}
.panel-close:hover{background:var(--border)}
.panel-body{flex:1;overflow-y:auto;padding:20px}

/* Tasks */
.tasks-section{margin-bottom:20px}
.tasks-title{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);margin-bottom:10px;font-weight:500}
.task-item{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border-radius:7px;border:1px solid var(--border);background:var(--bg);margin-bottom:6px}
.task-code{font-size:11px;font-weight:600;color:var(--text-muted);white-space:nowrap;min-width:48px;padding-top:1px}
.task-name{font-size:13px;color:var(--text);line-height:1.4}
.no-tasks{font-size:13px;color:var(--text-hint);font-style:italic}

/* Sub-process list in panel */
.sp-list-section{margin-bottom:20px}
.sp-list-title{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);margin-bottom:10px;font-weight:500}
.sp-list-item{display:flex;align-items:flex-start;gap:8px;padding:7px 10px;border-radius:7px;border:1px solid var(--border);background:var(--bg);margin-bottom:5px;cursor:pointer;transition:background .12s}
.sp-list-item:hover{background:#eeeae4}
.sp-item-code{font-size:11px;font-weight:600;color:var(--text-muted);min-width:44px;padding-top:1px}
.sp-item-name{font-size:13px;color:var(--text);line-height:1.4}

/* Nav */
.panel-nav{display:flex;gap:8px;padding:12px 20px;border-top:1px solid var(--border);flex-shrink:0}
.btn-nav{flex:1;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text);cursor:pointer;transition:background .12s}
.btn-nav:hover:not(:disabled){background:var(--border)}
.btn-nav:disabled{opacity:.35;cursor:default}

/* Hidden */
.domain-band.hidden,.process-card.hidden,.subproc-chip.hidden{display:none}
.process-row:not(:has(.process-card:not(.hidden))){display:none}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 20 20"><path d="M3 4h14v2H3zM3 9h10v2H3zM3 14h14v2H3z"/></svg>
    </div>
    <span class="logo-text">Architecture des processus</span>
  </div>
  <span class="header-meta">MISU · Document de travail</span>
</header>

<div class="app" id="app">
  <div class="diagram-pane">
    <div class="diagram-intro">
      <h1>Vue d'ensemble des processus</h1>
      <p>Cliquez sur un sous-processus pour afficher sa fiche détaillée avec ses tâches. Cliquez sur un processus pour ouvrir sa fiche de synthèse.</p>
    </div>

    <div class="search-bar">
      <span class="search-icon">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.2"/><line x1="10.5" y1="10.5" x2="13.5" y2="13.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      </span>
      <input type="search" id="search" placeholder="Rechercher un processus ou sous-processus…" oninput="doSearch(this.value)">
    </div>

    <div class="diagram-wrap" id="diagram"></div>
  </div>

  <div class="panel" id="panel">
    <div class="panel-header">
      <div class="panel-badge" id="panel-badge">
        <span id="panel-badge-dot" style="width:7px;height:7px;border-radius:50%;display:inline-block"></span>
        <span id="panel-cat-label"></span>
      </div>
      <div class="panel-title-row">
        <div>
          <div class="panel-code" id="panel-code"></div>
          <div class="panel-name" id="panel-name"></div>
        </div>
        <button class="panel-close" onclick="closePanel()">×</button>
      </div>
    </div>
    <div class="panel-body" id="panel-body"></div>
    <div class="panel-nav">
      <button class="btn-nav" id="btn-prev" onclick="navPanel(-1)">← Précédent</button>
      <button class="btn-nav" id="btn-next" onclick="navPanel(1)">Suivant →</button>
    </div>
  </div>
</div>

<script>
const DOMAINS = [
  {
    code: 'P', name: 'Pilotage',
    cat: 'pilotage',
    bg: '#1B3A7A', light: '#E8EEFA', mid: '#3D5CC2', dark: '#0F2148',
    rows: [
      [{ code:'P1', name:'Piloter la stratégie', subProcesses:[] }],
      [
        { code:'P2', name:"Gérer l'offre", subProcesses:[
          { code:'P2.1', name:'Gérer prestations de communication', tasks:[] },
          { code:'P2.2', name:'Gérer opérations marketing', tasks:[] }
        ]},
        { code:'P3', name:'Piloter la performance', subProcesses:[
          { code:'P3.1', name:'Calculer/Surveiller prix de revient desserts', tasks:[] },
          { code:'P3.2', name:'Surveiller/Négocier prix fournisseurs', tasks:[] }
        ]}
      ],
      [{ code:'P4', name:'Gérer les finances', subProcesses:[
        { code:'P4.1', name:'Facturer', tasks:[
          { code:'P4.1.1', name:'Créer factures clients' },
          { code:'P4.1.2', name:'Envoyer factures aux clients' },
          { code:'P4.1.3', name:'Déclencher prélèvements clients' },
          { code:'P4.1.4', name:"Envoyer factures et Grand Livre aux clients sur demande en fin d'année" },
          { code:'P4.1.5', name:"Gérer les retours d'argent" },
          { code:'P4.1.6', name:'Pointer règlements des factures clients' }
        ]},
        { code:'P4.2', name:'Recouvrer', tasks:[
          { code:'P4.2.1', name:'Relancer clients pour paiement factures' },
          { code:'P4.2.2', name:'Récupérer dettes sur site client' }
        ]},
        { code:'P4.3', name:'Décaisser', tasks:[
          { code:'P4.3.1', name:'Payer fournisseurs' },
          { code:'P4.3.2', name:'Pointer les débits associés aux achats fournisseurs' },
          { code:'P4.3.3', name:'Réaliser virements salaires' }
        ]},
        { code:'P4.4', name:'Gérer comptabilité', tasks:[
          { code:'P4.4.1', name:'Assurer relation avec le comptable' },
          { code:'P4.4.2', name:'Réunir éléments comptables' }
        ]}
      ]}]
    ]
  },
  {
    code: 'R', name: 'Réalisation',
    cat: 'realisation',
    bg: '#1A5C3E', light: '#E4F5EC', mid: '#268F5A', dark: '#0A3526',
    rows: [
      [{ code:'R1', name:'Commercialiser', subProcesses:[
        { code:'R1.1', name:'Gérer comptes clients', tasks:[] },
        { code:'R1.2', name:'Enregistrer/Évaluer commandes', tasks:[] },
        { code:'R1.3', name:"Communiquer l'offre", tasks:[] },
        { code:'R1.4', name:'Fidéliser clients', tasks:[] },
        { code:'R1.5', name:'Assurer service après-vente', tasks:[] }
      ]}],
      [
        { code:'R2', name:'Approvisionner', subProcesses:[
          { code:'R2.1', name:'Passer commandes fournisseurs', tasks:[] },
          { code:'R2.2', name:'Planifier livraisons fournisseurs', tasks:[] },
          { code:'R2.3', name:'Réceptionner commandes fournisseurs', tasks:[] },
          { code:'R2.4', name:'Stocker commandes fournisseurs', tasks:[] }
        ]},
        { code:'R3', name:'Fabriquer', subProcesses:[
          { code:'R3.1', name:'Piloter production', tasks:[
            { code:'R3.1.1', name:'Planifier tâches production' },
            { code:'R3.1.2', name:'Relever présence opérateurs' },
            { code:'R3.1.3', name:'Superviser production' },
            { code:'R3.1.4', name:'Optimiser séquences production' }
          ]},
          { code:'R3.2', name:'Réaliser production', tasks:[
            { code:'R3.2.1', name:'Produire desserts' },
            { code:'R3.2.2', name:'Conditionner desserts' },
            { code:'R3.2.3', name:'Contrôler qualité desserts' },
            { code:'R3.2.4', name:'Gérer préparation palettes' },
            { code:'R3.2.5', name:'Préparer palettes' },
            { code:'R3.2.6', name:'Stocker desserts' },
            { code:'R3.2.7', name:'Faire inventaire desserts en stock' }
          ]}
        ]},
        { code:'R4', name:'Expédier', subProcesses:[
          { code:'R4.1', name:'Préparer expédition', tasks:[
            { code:'R4.1.1', name:'Contrôler si commandes prises en charge' },
            { code:'R4.1.2', name:'Préparer départ livreur' },
            { code:'R4.1.3', name:'Éditer/Imprimer les bons de livraison' },
            { code:'R4.1.4', name:'Éditer bons de préparation' },
            { code:'R4.1.5', name:'Imprimer étiquettes' },
            { code:'R4.1.6', name:'Imprimer étiquettes commandes spéciales' },
            { code:'R4.1.7', name:'Étiqueter compléments de production' },
            { code:'R4.1.8', name:'Préparer commandes clients' },
            { code:'R4.1.9', name:"Créer bordereau d'envoi pour palettes" }
          ]},
          { code:'R4.2', name:'Livrer commandes clients', tasks:[
            { code:'R4.2.1', name:'Planifier livraisons en IdF' },
            { code:'R4.2.2', name:'Planifier livraison palettes vers clients hors IdF' },
            { code:'R4.2.3', name:'Charger véhicules de livraison' },
            { code:'R4.2.4', name:'Superviser livreurs en tournées' },
            { code:'R4.2.5', name:'Déposer commandes sur site clients' },
            { code:'R4.2.6', name:'Gérer bons de livraisons' },
            { code:'R4.2.7', name:'Encaisser/Relancer clients' }
          ]}
        ]}
      ],
      [{ code:'R5', name:'Gérer documentation', subProcesses:[
        { code:'R5.1', name:'Traiter e-mails', tasks:[] },
        { code:'R5.2', name:'Trier documents', tasks:[] },
        { code:'R5.3', name:'Archiver documents', tasks:[] }
      ]}]
    ]
  },
  {
    code: 'S', name: 'Support',
    cat: 'support',
    bg: '#7A3D10', light: '#FEF0E2', mid: '#C06E1C', dark: '#401E08',
    rows: [
      [
        { code:'S1', name:'Gérer le personnel', subProcesses:[
          { code:'S1.1', name:'Gérer contrats', tasks:[
            { code:'S1.1.1', name:'Enregistrer salariés' },
            { code:'S1.1.2', name:'Suivre signature contrats salariés' }
          ]},
          { code:'S1.2', name:'Gérer paie', tasks:[
            { code:'S1.2.1', name:"Saisir éléments de salaire de l'équipe de production" },
            { code:'S1.2.2', name:'Enregistrement présence/absence des salariés' },
            { code:'S1.2.3', name:'Enregistrement des éléments de salaire' }
          ]}
        ]},
        { code:'S2', name:'Maintenir les équipements', subProcesses:[
          { code:'S2.1', name:'Contrôler propreté camions', tasks:[] },
          { code:'S2.2', name:'Contrôler mécanique camions', tasks:[] }
        ]},
        { code:'S3', name:'Gérer achats hors MP et logistique', subProcesses:[
          { code:'S3.1', name:'Gérer contrats fournisseurs', tasks:[] },
          { code:'S3.2', name:'Acheter fournitures de bureau', tasks:[] }
        ]},
        { code:'S4', name:"Gérer système d'information", subProcesses:[
          { code:'S4.2', name:'Gérer matériel informatique', tasks:[] },
          { code:'S4.3', name:'Gérer solutions logicielles', tasks:[] },
          { code:'S4.4', name:'Gérer système de surveillance', tasks:[] }
        ]}
      ]
    ]
  },
  {
    code: 'C', name: 'Conformité et Qualité',
    cat: 'conformite',
    bg: '#82192A', light: '#FBE8EB', mid: '#C43040', dark: '#480C17',
    rows: [
      [
        { code:'C1', name:'Maîtriser hygiène', subProcesses:[
          { code:'C1.1', name:'Ranger chambre froide MP', tasks:[] },
          { code:'C1.2', name:'Ranger chambre froide négative', tasks:[] },
          { code:'C1.3', name:'Ranger stockage marchandises', tasks:[] },
          { code:'C1.4', name:'Nettoyer local', tasks:[] }
        ]},
        { code:'C2', name:'Assurer la traçabilité', subProcesses:[] },
        { code:'C3', name:'Améliorer en continu', subProcesses:[] }
      ]
    ]
  }
];

const ALL_NODES = [];
DOMAINS.forEach(dom => {
  dom.rows.flat().forEach(proc => {
    ALL_NODES.push({ code: proc.code, name: proc.name, type: 'process', domain: dom, proc: proc });
    proc.subProcesses.forEach(sp => {
      ALL_NODES.push({ code: sp.code, name: sp.name, type: 'subProcess', domain: dom, process: proc, tasks: sp.tasks });
    });
  });
});

function findNode(code) { return ALL_NODES.find(n => n.code === code); }

function buildDiagram() {
  const wrap = document.getElementById('diagram');
  wrap.innerHTML = '';

  DOMAINS.forEach(dom => {
    const band = document.createElement('div');
    band.className = 'domain-band';
    band.dataset.cat = dom.cat;
    band.style.background = dom.light;
    band.style.border = '1.5px solid ' + dom.mid + '30';

    const hdr = document.createElement('div');
    hdr.className = 'domain-header';
    hdr.style.background = dom.bg;
    hdr.innerHTML = '<span class="domain-label" style="color:' + dom.light + '">' + dom.name + '</span>';
    band.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'domain-body';

    dom.rows.forEach(row => {
      const rowEl = document.createElement('div');
      rowEl.className = 'process-row';

      row.forEach(proc => {
        const card = document.createElement('div');
        card.className = 'process-card';
        card.id = 'proc-' + proc.code;
        card.dataset.code = proc.code;
        card.dataset.cat = dom.cat;

        const header = document.createElement('div');
        header.className = 'process-header';
        header.innerHTML =
          '<span class="process-code-badge" style="background:' + dom.light + ';color:' + dom.dark + '">' + proc.code + '</span>' +
          '<span class="process-name">' + proc.name + '</span>';
        header.addEventListener('click', () => openNodePanel(proc.code));
        card.appendChild(header);

        if (proc.subProcesses.length) {
          const spWrap = document.createElement('div');
          spWrap.className = 'subproc-wrap';
          proc.subProcesses.forEach(sp => {
            const chip = document.createElement('span');
            chip.className = 'subproc-chip';
            chip.id = 'sp-' + sp.code;
            chip.dataset.code = sp.code;
            chip.dataset.cat = dom.cat;
            chip.style.cssText = 'background:' + dom.light + ';color:' + dom.dark + ';--chip-accent:' + dom.mid;
            chip.innerHTML =
              '<span class="chip-code">' + sp.code + '</span>' +
              '<span class="chip-name">' + sp.name + '</span>' +
              (sp.tasks.length ? '<span class="chip-tasks">(' + sp.tasks.length + ' tâches)</span>' : '');
            chip.addEventListener('click', e => { e.stopPropagation(); openNodePanel(sp.code); });
            spWrap.appendChild(chip);
          });
          card.appendChild(spWrap);
        }

        rowEl.appendChild(card);
      });

      body.appendChild(rowEl);
    });

    band.appendChild(body);
    wrap.appendChild(band);
  });
}

let currentCode = null;

function openNodePanel(code) {
  const node = findNode(code);
  if (!node) return;
  currentCode = code;

  document.querySelectorAll('.subproc-chip.active').forEach(c => c.classList.remove('active'));
  if (node.type === 'subProcess') {
    const chip = document.getElementById('sp-' + code);
    if (chip) chip.classList.add('active');
  }

  const dom = node.domain;
  document.getElementById('panel-badge').style.cssText = 'background:' + dom.light + ';color:' + dom.dark;
  document.getElementById('panel-badge-dot').style.background = dom.mid;
  document.getElementById('panel-cat-label').textContent = dom.name;
  document.getElementById('panel-code').textContent = code;
  document.getElementById('panel-name').textContent = node.name;

  const body = document.getElementById('panel-body');
  body.innerHTML = '';

  if (node.type === 'subProcess') {
    if (node.tasks && node.tasks.length) {
      const sec = document.createElement('div');
      sec.className = 'tasks-section';
      sec.innerHTML = '<div class="tasks-title">Tâches (' + node.tasks.length + ')</div>';
      node.tasks.forEach(t => {
        const item = document.createElement('div');
        item.className = 'task-item';
        item.innerHTML = '<span class="task-code">' + t.code + '</span><span class="task-name">' + t.name + '</span>';
        sec.appendChild(item);
      });
      body.appendChild(sec);
    } else {
      const p = document.createElement('p'); p.className = 'no-tasks';
      p.textContent = 'Aucune tâche détaillée pour ce sous-processus.';
      body.appendChild(p);
    }
  } else {
    const proc = node.proc;
    if (proc && proc.subProcesses.length) {
      const sec = document.createElement('div');
      sec.className = 'sp-list-section';
      sec.innerHTML = '<div class="sp-list-title">Sous-processus (' + proc.subProcesses.length + ')</div>';
      proc.subProcesses.forEach(sp => {
        const item = document.createElement('div');
        item.className = 'sp-list-item';
        item.innerHTML = '<span class="sp-item-code">' + sp.code + '</span><span class="sp-item-name">' + sp.name + (sp.tasks.length ? ' <span style="opacity:.5;font-size:11px">(' + sp.tasks.length + ' tâches)</span>' : '') + '</span>';
        item.addEventListener('click', () => openNodePanel(sp.code));
        sec.appendChild(item);
      });
      body.appendChild(sec);
    } else {
      const p = document.createElement('p'); p.className = 'no-tasks';
      p.textContent = "Ce processus n'a pas de sous-processus.";
      body.appendChild(p);
    }
  }

  updateNavButtons();
  document.getElementById('panel').classList.add('open');
  document.getElementById('app').classList.add('panel-open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  document.getElementById('app').classList.remove('panel-open');
  document.querySelectorAll('.subproc-chip.active').forEach(c => c.classList.remove('active'));
  currentCode = null;
}

function updateNavButtons() {
  const idx = ALL_NODES.findIndex(n => n.code === currentCode);
  document.getElementById('btn-prev').disabled = idx <= 0;
  document.getElementById('btn-next').disabled = idx >= ALL_NODES.length - 1;
}

function navPanel(dir) {
  const idx = ALL_NODES.findIndex(n => n.code === currentCode);
  const next = ALL_NODES[idx + dir];
  if (next) openNodePanel(next.code);
}

function doSearch(q) {
  const term = q.toLowerCase().trim();
  if (!term) {
    document.querySelectorAll('.domain-band,.process-card,.subproc-chip').forEach(el => el.classList.remove('hidden'));
    return;
  }
  document.querySelectorAll('.domain-band').forEach(b => b.classList.add('hidden'));
  document.querySelectorAll('.process-card').forEach(c => c.classList.add('hidden'));
  document.querySelectorAll('.subproc-chip').forEach(c => c.classList.add('hidden'));

  ALL_NODES.forEach(node => {
    const match = node.code.toLowerCase().includes(term) || node.name.toLowerCase().includes(term);
    if (!match) return;
    if (node.type === 'process') {
      const card = document.getElementById('proc-' + node.code);
      if (card) {
        card.classList.remove('hidden');
        card.closest('.domain-band')?.classList.remove('hidden');
        card.querySelectorAll('.subproc-chip').forEach(c => c.classList.remove('hidden'));
      }
    } else {
      const chip = document.getElementById('sp-' + node.code);
      if (chip) {
        chip.classList.remove('hidden');
        chip.closest('.process-card')?.classList.remove('hidden');
        chip.closest('.domain-band')?.classList.remove('hidden');
      }
    }
  });
}

buildDiagram();
</script>
</body>
</html>
